<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in — The Weekly Shelf</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-header">
  <div class="brand">The Weekly <em>Shelf</em></div>
  <nav class="site-nav"></nav>
</header>

<div class="wrap">
  <div class="card">
    <h2>Welcome back</h2>
    <form id="loginForm">
      <label for="email">Email</label>
      <input id="email" type="email" required>
      <label for="password">Password</label>
      <input id="password" type="password" required>
      <button type="submit">Log in</button>
    </form>
    <div id="msg" class="msg"></div>
    <p style="margin-top:20px; font-size:14px;">New here? <a href="register.html">Start your free month</a></p>
  </div>
</div>

<script src="assets/app.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = e.target.querySelector('button');
  const msg = document.getElementById('msg');
  btn.disabled = true; msg.textContent = ''; msg.className = 'msg';

  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  const res = await api('login', { email, password });
  btn.disabled = false;

  if (!res.ok) {
    msg.textContent = res.error;
    msg.className = 'msg error';
    return;
  }
  saveSession(res.user);
  window.location.href = 'dashboard.html';
});
</script>
</body>
</html>
